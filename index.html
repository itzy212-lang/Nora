<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%232a6ef5'/%3E%3Ctext x='16' y='24' text-anchor='middle' font-size='20' font-family='system-ui'%3E%E2%9C%A8%3C/text%3E%3C/svg%3E" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Ely — Practice Assistant</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script>
    (function() {
      try {
        var s = JSON.parse(localStorage.getItem('ely5_settings') || '{}');
        if (s.theme === 'light') document.body.classList.add('light');
        else if (s.theme === 'system' && window.matchMedia && !window.matchMedia('(prefers-color-scheme:dark)').matches)
          document.body.classList.add('light');
      } catch(e) {}
    })();
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
