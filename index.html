<!DOCTYPE html> 
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%230a0a0a'/%3E%3Ctext x='16' y='26' text-anchor='middle' font-size='26' font-family='Bahnschrift Light,DIN Alternate,sans-serif' font-weight='300' fill='white'%3En%3C/text%3E%3C/svg%3E" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Nora" />
  <meta name="theme-color" content="#0a0a0a" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icons/icon.svg" />
  <title>Nora — Virtual Assistant</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script>
    (function() {
      try {
        var s = JSON.parse(localStorage.getItem('ely5_settings') || '{}');
        if (s.theme === 'light') document.body.classList.add('light');
        else if (s.theme === 'system' && window.matchMedia && !window.matchMedia('(prefers-color-scheme:dark)').matches)
          document.body.classList.add('light');
      } catch(e) {}
    })();
  </script>
</head>
<body>
  <style>
    html, body { margin: 0; padding: 0; background: #0a0a0a; }
    #nora-splash {
      position: fixed; inset: 0; z-index: 99999;
      background: #0a0a0a;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      transition: opacity 0.5s ease;
    }
    #nora-splash .nora-text {
      font-family: 'Bahnschrift Light', 'DIN Alternate', Arial, sans-serif;
      font-size: 64px; font-weight: 300; letter-spacing: -1px;
      color: white; line-height: 1;
    }
    #nora-splash .nora-dots {
      display: inline-flex; align-items: flex-end;
      gap: 7px; padding-left: 9px; padding-bottom: 12px;
    }
    #nora-splash .nora-dot {
      width: 9px; height: 9px; border-radius: 50%;
      background: white; display: inline-block;
      animation: noraDotUp 1.4s ease-in-out infinite;
    }
    #nora-splash .d2 { animation-delay: 0.3s; }
    #nora-splash .d3 { animation-delay: 0.6s; }
    @keyframes noraDotUp {
      0%, 100% { opacity: 0.15; transform: translateY(0); }
      30% { opacity: 1; transform: translateY(-7px); }
      60% { opacity: 0.15; transform: translateY(0); }
    }
    #nora-splash .nora-sub {
      font-family: 'Bahnschrift Light', 'DIN Alternate', Arial, sans-serif;
      font-size: 12px; color: rgba(255,255,255,0.35);
      letter-spacing: 3px; margin-top: 10px; font-weight: 300;
    }
  </style>
  <div id="nora-splash">
    <div style="display:flex;align-items:baseline">
      <span class="nora-text">nora</span>
      <span class="nora-dots">
        <span class="nora-dot d1"></span>
        <span class="nora-dot d2"></span>
        <span class="nora-dot d3"></span>
      </span>
    </div>
    <div class="nora-sub">virtual assistant</div>
  </div>
  <script>
    window.__hideSplash = function() {
      var el = document.getElementById('nora-splash');
      if (el) {
        el.style.opacity = '0';
        setTimeout(function() { el.style.display = 'none'; }, 500);
      }
    };
  </script>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(reg => console.log('[SW] registered:', reg.scope))
          .catch(err => console.warn('[SW] registration failed:', err));
      });
    }
  </script>
</body>
</html>
